server:
  port: 8084

spring:
  application:
    name: app-azure-cliente
  r2dbc:
    url: r2dbc:h2:mem:///clientesdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
