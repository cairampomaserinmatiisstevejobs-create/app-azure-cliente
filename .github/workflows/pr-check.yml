name: PR Check — Build & Test

on:
  pull_request:
    branches: [dev]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'

jobs:
  build-and-test:
    name: Build y Test (sin deploy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        run: mvn -B verify --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
