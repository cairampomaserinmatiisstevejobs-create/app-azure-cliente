name: Pipeline — Feature → PR → Merge → ACR → AKS

on:
  push:
    branches:
      - 'feature/**'

env:
  IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/app-azure-cliente

jobs:

  # ─── STAGE 1: Compilar y validar ────────────────────────────────────────────
  build:
    name: "Stage 1 — Build & Validate"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Maven package
        run: mvn package -DskipTests --no-transfer-progress

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ─── STAGE 2: Crear Pull Request automático ──────────────────────────────────
  create-pr:
    name: "Stage 2 — Crear PR → main"
    runs-on: ubuntu-latest
    needs: build
    outputs:
      pr_number: ${{ steps.pr.outputs.pr_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Crear PR automático hacia main
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          EXISTING=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR ya existe: #$EXISTING"
            echo "pr_number=$EXISTING" >> $GITHUB_OUTPUT
          else
            PR=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Auto PR: $BRANCH" \
              --body "Pipeline automático desde rama $BRANCH — MSIRILDEV")
            NUMBER=$(echo "$PR" | grep -o '[0-9]*$')
            echo "PR creado: #$NUMBER"
            echo "pr_number=$NUMBER" >> $GITHUB_OUTPUT
          fi

  # ─── STAGE 3: Merge automático ───────────────────────────────────────────────
  merge-pr:
    name: "Stage 3 — Merge PR → main"
    runs-on: ubuntu-latest
    needs: create-pr
    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ needs.create-pr.outputs.pr_number }} \
            --merge \
            --admin \
            --repo ${{ github.repository }}

  # ─── STAGE 4: Docker Build & Push ACR ───────────────────────────────────────
  docker-push:
    name: "Stage 4 — Docker Build → ACR"
    runs-on: ubuntu-latest
    needs: merge-pr
    steps:
      - name: Checkout main (post-merge)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Login ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  # ─── STAGE 5: Deploy AKS ─────────────────────────────────────────────────────
  deploy-aks:
    name: "Stage 5 — Deploy → AKS"
    runs-on: ubuntu-latest
    needs: docker-push
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: rg-app-azure-cliente
          cluster-name: aks-app-cliente

      - name: Actualizar imagen en AKS
        run: |
          kubectl set image deployment/app-azure-cliente \
            app-azure-cliente=${{ env.IMAGE }}:${{ github.sha }} \
            --namespace=default

      - name: Esperar rollout
        run: |
          kubectl rollout status deployment/app-azure-cliente \
            --namespace=default \
            --timeout=120s
