name: CI/CD - Build, Push ACR, Deploy AKS

on:
  push:
    branches: [ main ]

env:
  IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/app-azure-cliente

jobs:

  build:
    name: Build JAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Maven package
        run: mvn package -DskipTests --no-transfer-progress

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  docker-push:
    name: Docker Build and Push to ACR
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Login ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  deploy-aks:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: docker-push
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: rg-app-cliente
          cluster-name: aks-app-cliente

      - name: Update deployment image
        run: |
          kubectl set image deployment/app-azure-cliente \
            app-azure-cliente=${{ env.IMAGE }}:${{ github.sha }} \
            --namespace=default

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/app-azure-cliente \
            --namespace=default \
            --timeout=120s
